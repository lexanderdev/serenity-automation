name: CI Orange
on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Nota: Normalmente Sonar se corre una sola vez.
        # Si dejas la matriz, se enviarán dos reportes (uno por Java 17 y otro por 21).
        # Generalmente basta con analizar la versión de producción (ej. 17).
        java-version: ['21' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # IMPORTANTE: Sonar necesita el historial completo para el análisis

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      # Caché para SonarCloud
      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ matrix.java-version }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.java-version }}-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Configurar Chrome
        uses: browser-actions/setup-chrome@latest

      # Ejecutamos construcción, tests y análisis de Sonar en un solo paso
      - name: Build, Test and Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: ./gradlew clean test sonar --info --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Test Reports Java ${{ matrix.java-version }}
          path: build/reports/tests/test

      - name: Upload Serenity reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Serenity Reports Java ${{ matrix.java-version }}
          path: target/site/serenity

  publish-report:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Serenity report
        uses: actions/download-artifact@v5
        with:
          name: Serenity Reports Java 21
          path: ./serenity-report

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./serenity-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4